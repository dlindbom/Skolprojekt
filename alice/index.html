        body { font-family: 'Inter', system-ui, sans-serif; }
        .grid-bg {
            background-image:

            background-size: 24px 24px;
        }
        .hard-shadow {
            box-shadow: 5px 5px 0px 0px rgba(0,0,0,0.07);
            transition: all 0.2s ease;
        }
        .hard-shadow:hover {
            box-shadow: 7px 7px 0px 0px rgba(0,0,0,0.1);
            transform: translate(-2px, -2px);
        }
        .hard-shadow:active {
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,0.07);
            transform: translate(2px, 2px);
        }
        @keyframes drift {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.12; }
            50% { transform: translateY(-14px) rotate(6deg); opacity: 0.25; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.12; }
        }
        .floating {
            position: fixed;
            font-size: 1.8rem;
            animation: drift 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
