<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ämnen, metaller och hållbar utveckling — NO · Kemi · Alice · Åk 6 · Apr 26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #0f172a;
            --bg-card: #1e293b;
            --accent: #3b82f6;
            --accent-strong: #2563eb;
            --accent-muted: rgba(59, 130, 246, 0.6);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(59, 130, 246, 0.2);
            --text-scale: 1;
        }

        body[data-barn="astrid"] {
            --bg-base: #1a0f1a;
            --bg-card: #2a1a2a;
            --accent: #a855f7;
            --accent-strong: #9333ea;
            --accent-muted: rgba(168, 85, 247, 0.6);
            --border: rgba(168, 85, 247, 0.2);
            --text-scale: 1.15;
        }
        body[data-barn="alfred"] {
            --bg-base: #0f1a14;
            --bg-card: #162118;
            --accent: #22c55e;
            --accent-strong: #16a34a;
            --accent-muted: rgba(34, 197, 94, 0.6);
            --border: rgba(34, 197, 94, 0.2);
            --text-scale: 1;
        }
        body[data-barn="alice"] {
            --bg-base: #0f172a;
            --bg-card: #1e293b;
            --accent: #3b82f6;
            --accent-strong: #2563eb;
            --accent-muted: rgba(59, 130, 246, 0.6);
            --border: rgba(59, 130, 246, 0.2);
            --text-scale: 1;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-size: calc(1rem * var(--text-scale));
            min-height: 100vh;
        }

        .bg-card { background-color: var(--bg-card); }
        .bg-base { background-color: var(--bg-base); }
        .text-accent { color: var(--accent); }
        .text-accent-muted { color: var(--accent-muted); }
        .bg-accent { background-color: var(--accent); }
        .bg-accent-strong { background-color: var(--accent-strong); }
        .border-accent { border-color: var(--border); }
        .ring-accent { --tw-ring-color: var(--accent); }

        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        [x-cloak] { display: none !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-card); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        .dot-pattern {
            background-image: radial-gradient(var(--accent-muted) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.15;
        }

        .self-explain-prompt {
            background: color-mix(in srgb, var(--accent) 8%, transparent);
            border-left: 4px solid var(--accent);
            padding: 0.75rem 1rem;
            margin: 1rem 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: var(--text-muted);
        }

        .self-explain-prompt::before {
            content: "⏸ ";
            font-style: normal;
            font-weight: bold;
            color: var(--accent);
        }

        .tts-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--accent);
            color: var(--bg-base);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin-bottom: 1rem;
        }
        .tts-btn:hover { background: var(--accent-strong); }
        .tts-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>

<body data-barn="alice" x-data="studyApp()" x-init="init()">

    <div class="fixed inset-0 z-0 dot-pattern pointer-events-none"></div>

    <header class="relative z-10 border-b border-accent bg-base/90 backdrop-blur-md sticky top-0">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-accent p-2 rounded-lg shadow-lg">
                    <span class="text-2xl">🧪</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide">Ämnen, metaller och hållbar utveckling</h1>
                    <p class="text-accent-muted text-xs uppercase tracking-widest">NO · Kemi · Alice · Åk 6 · Apr 26</p>
                </div>
            </div>

            <div class="flex bg-card p-1 rounded-lg overflow-x-auto max-w-full">
                <button @click="mode = 'text'"
                        :class="mode === 'text' ? 'bg-accent text-white shadow-lg' : 'text-accent-muted hover:text-white'"
                        class="px-4 md:px-6 py-2 rounded-md text-sm font-bold transition-all duration-300">
                    📖 Fakta
                </button>
                <button @click="mode = 'cards'"
                        :class="mode === 'cards' ? 'bg-accent text-white shadow-lg' : 'text-accent-muted hover:text-white'"
                        class="px-4 md:px-6 py-2 rounded-md text-sm font-bold transition-all duration-300">
                    🎴 Flashcards
                </button>
                <button @click="mode = 'quiz'"
                        :class="mode === 'quiz' ? 'bg-accent text-white shadow-lg' : 'text-accent-muted hover:text-white'"
                        class="px-4 md:px-6 py-2 rounded-md text-sm font-bold transition-all duration-300">
                    ✅ Quiz
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 relative z-10 max-w-4xl">

        <!-- ===== FAKTA-LÄGE ===== -->
        <div x-show="mode === 'text'" x-transition.opacity.duration.500ms class="space-y-8 pb-12">

            <!-- Intro: så här är provet designat + vikten av att öva själv först -->
            <div class="bg-card rounded-2xl border-2 border-accent overflow-hidden">
                <button @click="showIntro = !showIntro"
                        class="w-full flex justify-between items-center p-4 text-left hover:bg-accent-strong/10 transition">
                    <span class="font-bold text-accent flex items-center gap-2">
                        <span>🧠</span>
                        <span x-text="intro.title"></span>
                    </span>
                    <span class="text-accent text-xl" x-text="showIntro ? '▾' : '▸'"></span>
                </button>
                <div x-show="showIntro" x-collapse class="px-5 pb-5 text-sm md:text-base leading-relaxed" x-html="intro.html"></div>
            </div>

            <template x-if="config.tts_enabled">
                <button @click="speakAll()" class="tts-btn" :disabled="tts.speaking">
                    <span x-show="!tts.speaking">🔊 Läs upp</span>
                    <span x-show="tts.speaking">⏸ Stoppa</span>
                </button>
            </template>

            <template x-for="(section, sIdx) in faktatext" :key="sIdx">
                <div class="bg-card rounded-2xl p-6 md:p-8 border border-accent shadow-xl">
                    <h2 class="text-2xl font-bold text-accent mb-4 border-b border-accent pb-2" x-text="section.heading"></h2>
                    <div class="space-y-4 leading-relaxed" x-html="section.html"></div>
                </div>
            </template>
        </div>

        <!-- ===== FLASHCARDS-LÄGE ===== -->
        <div x-show="mode === 'cards'" x-transition.opacity.duration.500ms class="pb-12" x-cloak>

            <div class="mb-6 text-center">
                <p class="text-accent-muted text-sm">Kort <span x-text="cardIndex + 1"></span> av <span x-text="flashcards.length"></span></p>
                <div class="w-full bg-card rounded-full h-2 mt-2">
                    <div class="bg-accent h-2 rounded-full transition-all duration-300"
                         :style="'width: ' + ((cardIndex + 1) / flashcards.length * 100) + '%'"></div>
                </div>
            </div>

            <div class="perspective-1000 mb-8">
                <div class="relative w-full min-h-[320px] transform-style-3d transition-transform duration-700 cursor-pointer"
                     :class="{ 'rotate-y-180': flipped }"
                     @click="!flipped && (flipped = true)">

                    <!-- FRAMSIDA: fråga + gissnings-prompt -->
                    <div class="absolute inset-0 backface-hidden bg-card rounded-2xl p-8 border-2 border-accent shadow-2xl flex flex-col justify-center items-center text-center">
                        <p class="text-accent-muted text-xs uppercase tracking-widest mb-4">Fråga</p>
                        <p class="text-xl md:text-2xl font-semibold mb-6" x-text="flashcards[cardIndex].q"></p>
                        <template x-if="flashcards[cardIndex].bild">
                            <img :src="flashcards[cardIndex].bild" alt="" class="max-h-32 rounded-lg mb-4">
                        </template>
                        <p class="text-accent-muted text-sm italic mt-auto">🧠 Gissa i huvudet först — klicka sedan för att vända</p>
                    </div>

                    <!-- BAKSIDA: svar -->
                    <div class="absolute inset-0 backface-hidden rotate-y-180 bg-accent rounded-2xl p-8 border-2 border-accent shadow-2xl flex flex-col justify-center items-center text-center">
                        <p class="text-white/70 text-xs uppercase tracking-widest mb-4">Svar</p>
                        <p class="text-lg md:text-xl text-white leading-relaxed" x-text="flashcards[cardIndex].a"></p>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 justify-center flex-wrap">
                <button @click="prevCard()" class="bg-card hover:bg-accent-strong px-5 py-2 rounded-lg font-semibold border border-accent transition">← Föregående</button>
                <button @click="flipped = !flipped" class="bg-accent hover:bg-accent-strong text-white px-5 py-2 rounded-lg font-semibold transition" x-text="flipped ? '↺ Vänd tillbaka' : '🔄 Vänd kort'"></button>
                <button @click="nextCard()" class="bg-card hover:bg-accent-strong px-5 py-2 rounded-lg font-semibold border border-accent transition">Nästa →</button>
                <button @click="shuffleDeck()" class="bg-card hover:bg-accent-strong px-5 py-2 rounded-lg font-semibold border border-accent transition">🎲 Blanda</button>
            </div>
        </div>

        <!-- ===== QUIZ-LÄGE ===== -->
        <div x-show="mode === 'quiz'" x-transition.opacity.duration.500ms class="pb-12" x-cloak>

            <div class="mb-6 bg-card rounded-xl p-4 border border-accent flex justify-between items-center">
                <div>
                    <p class="text-accent-muted text-sm">Poäng: <span class="text-accent font-bold text-lg" x-text="score"></span> / <span x-text="quiz.length"></span></p>
                </div>
                <div x-show="answeredCount === quiz.length" class="text-right">
                    <p class="text-accent font-bold" x-text="Math.round(score/quiz.length*100) + '%'"></p>
                </div>
            </div>

            <!-- Metakognitiv feedback (Alice) -->
            <template x-if="config.metacognitive_feedback && answeredCount === quiz.length">
                <div class="mb-6 bg-card rounded-xl p-5 border-2 border-accent">
                    <h3 class="font-bold text-accent mb-2">🎯 Självreflektion</h3>
                    <p class="text-sm" x-text="metacognitiveMessage()"></p>
                </div>
            </template>

            <div class="space-y-6">
                <template x-for="(item, qIdx) in quiz" :key="qIdx">
                    <div class="bg-card rounded-xl p-5 border border-accent">
                        <p class="text-accent-muted text-xs mb-2">Fråga <span x-text="qIdx + 1"></span></p>
                        <p class="font-semibold text-lg mb-4" x-text="item.q"></p>

                        <!-- FLERVAL -->
                        <template x-if="item.typ === 'flerval'">
                            <div class="space-y-2">
                                <template x-for="(option, oIdx) in item.options" :key="oIdx">
                                    <button @click="answerFlerval(qIdx, oIdx)"
                                            :disabled="item.answered"
                                            :class="{
                                                'bg-green-600/30 border-green-500': item.answered && oIdx === item.correct,
                                                'bg-red-600/20 border-red-500': item.answered && oIdx === item.selected && oIdx !== item.correct,
                                                'bg-base border-accent hover:border-accent hover:bg-accent-strong': !item.answered,
                                                'opacity-50': item.answered && oIdx !== item.correct && oIdx !== item.selected
                                            }"
                                            class="w-full text-left px-4 py-3 rounded-lg border transition-all"
                                            x-text="option"></button>
                                </template>
                            </div>
                        </template>

                        <!-- FRITEXT -->
                        <template x-if="item.typ === 'fritext'">
                            <div>
                                <div x-show="!item.answered" class="flex gap-2">
                                    <input type="text"
                                           x-model="item.userAnswer"
                                           @keydown.enter="answerFritext(qIdx)"
                                           placeholder="Skriv ditt svar..."
                                           class="flex-grow bg-base border border-accent rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 ring-accent">
                                    <button @click="answerFritext(qIdx)"
                                            class="bg-accent hover:bg-accent-strong text-white px-4 py-2 rounded-lg font-semibold transition">Svara</button>
                                </div>
                                <div x-show="item.answered" class="space-y-2">
                                    <div :class="item.correct_answer ? 'bg-green-600/20 border-green-500' : 'bg-red-600/20 border-red-500'" class="border rounded-lg p-3">
                                        <p class="text-xs text-accent-muted mb-1">Ditt svar:</p>
                                        <p x-text="item.userAnswer"></p>
                                    </div>
                                    <div class="bg-base border border-accent rounded-lg p-3">
                                        <p class="text-xs text-accent-muted mb-1">Facit:</p>
                                        <p x-text="item.accepted[0]"></p>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <div class="text-center mt-8">
                <button @click="resetQuiz()" class="text-accent-muted hover:text-white underline">Börja om quizet</button>
            </div>
        </div>

    </main>

    <footer class="text-center py-6 text-accent-muted text-sm relative z-10">
        <p>Lycka till på provet! 💪</p>
    </footer>

    <script>
        // ============================================================
        // PROV-DATA — fylls av studieportal-prov-skillen vid generering
        // ============================================================

        const PROV_CONFIG = {
            title: "Ämnen, metaller och hållbar utveckling",
            subtitle: "NO · Kemi · Alice · Åk 6 · Apr 26",
            barn: "alice",           // "astrid" | "alfred" | "alice"
            alder: 13,
            tts_enabled: false,         // true för Astrid
            metacognitive_feedback: true,  // true för Alice
            emoji: "🧪"
        };

        const FAKTATEXT = [
            // Fylls in vid generering. Format:
            // { heading: "...", html: "<p>...</p>" }
            // html kan innehålla <div class='self-explain-prompt'>Förklara varför...</div>
                        {"heading": "Atomer, molekyler och grundämnen", "html": "<p>Allt materiellt du känner till är uppbyggt av <strong>atomer</strong>. En atom är så liten att vi inte kan se den, men vi vet att den har en <strong>kärna</strong> av protoner och neutroner, och <strong>elektroner</strong> som rör sig runt kärnan.</p><p>Ett <strong>grundämne</strong> är ett ämne där alla atomer är av samma slag. Guld består bara av guldatomer, syre bara av syreatomer. När två eller flera atomer binder ihop kallas de en <strong>molekyl</strong> — det kan vara två likadana (O₂) eller olika (H₂O).</p><p>Ämnen finns i tre <strong>aggregationsformer</strong>: fast, flytande och gas. Is, vatten och vattenånga är samma H₂O-molekyler som rör sig olika snabbt — det är inte olika ämnen.</p><div class='self-explain-prompt'>Förklara med egna ord: om is, vatten och ånga är samma ämne, vad är det då egentligen som skiljer dem åt?</div>"},
            {"heading": "Kemiska föreningar och kemins språk", "html": "<p>När olika grundämnen binder sig till varandra bildas en <strong>kemisk förening</strong>. Vatten är en förening av väte och syre; koldioxid av kol och syre; rost av järn och syre.</p><p>Den svenske kemisten <strong>Jöns Jacob Berzelius</strong> uppfann systemet med bokstäver som kemiska tecken — H för väte (hydrogen), O för syre (oxygen). Poängen är att samma tecken förstås i hela världen oavsett språk.</p><p>En <strong>kemisk formel</strong> beskriver både vilka grundämnen molekylen innehåller och i vilka antal. H₂O betyder två väteatomer och en syreatom. Ändras förhållandena blir det en annan förening — H₂O₂ (väteperoxid) är något helt annat än vatten.</p><div class='self-explain-prompt'>Varför kan egenskaperna i en förening skilja sig helt från grundämnena den är gjord av? (Tänk på salt: natrium är en reaktiv metall, klor en giftig gas — tillsammans är de ofarliga.)</div>"},
            {"heading": "Kolets kretslopp — fotosyntes och förbränning", "html": "<p><strong>Kol</strong> är ett grundämne med ovanlig förmåga att binda långa kedjor. Det är därför kol finns i allt levande: DNA, proteiner, socker, fett.</p><p>I luften finns kol som <strong>koldioxid</strong> (CO₂). Växter tar upp koldioxiden via <strong>fotosyntesen</strong>: med hjälp av solljus bygger de socker av koldioxid och vatten, och släpper ut syre som restprodukt. Djur och människor gör tvärtom — vi andas in syre, bryter ner socker för energi och andas ut koldioxid. Det är <strong>förbränning</strong>.</p><p>När växter och djur dör och bryts ner frisätts kolet igen, oftast som koldioxid. En liten del begravs och kan under miljontals år omvandlas till <strong>fossila bränslen</strong> — stenkol, olja och naturgas. Det är kol som lämnat det snabba kretsloppet och lagrats ur systemet.</p><div class='self-explain-prompt'>Förklara varför förbränning av ved släpper ut koldioxid, men inte räknas som lika skadligt för klimatet som att bränna olja.</div>"},
            {"heading": "Bergarter, mineraler och malmer", "html": "<p>Den fasta massan i jordskorpan kallas <strong>berggrunden</strong>. Den är uppbyggd av <strong>bergarter</strong> — till exempel granit (vanlig i Sverige) och kalksten (som Öland till stora delar består av).</p><p>En bergart är en blandning av flera <strong>mineraler</strong>. Ett mineral är en kemisk förening i berggrunden, ofta kristallin. Det finns ungefär 3000 kända mineraler. Ädelstenar som ametist och bergkristall är särskilt vackra och hårda mineraler.</p><p>En <strong>malm</strong> är en bergart som innehåller så mycket metall att det är värt att bryta den. Järnmalm finns i Sverige mest som <strong>magnetit</strong> (svart, magnetisk, innehåller mest järn) och <strong>hematit</strong> (röd). Båda är järnoxider — järnatomer bundna till syre. Metallen finns alltså inte ren i jorden utan måste utvinnas.</p><div class='self-explain-prompt'>Varför är malm en icke förnybar resurs, och vad säger det om värdet av att återvinna metaller?</div>"},
            {"heading": "Från malm till metall — fyra steg", "html": "<p>Läran om hur man utvinner och bearbetar metaller kallas <strong>metallurgi</strong>. Att göra en bil av järnmalm tar fyra steg.</p><p><strong>Steg 1 — Brytning.</strong> Malmen bryts antingen som <strong>dagbrott</strong> (vid markytan, öppet hål) eller i en <strong>gruva</strong> (djupa tunnlar i berget).</p><p><strong>Steg 2 — Anrikning.</strong> Berget mals till pulver och järnet skiljs från stenen. Eftersom magnetit är magnetisk används en stor snurrande magnet: järnet fastnar, stenen faller bort. Anrikning betyder att höja halten av ett ämne.</p><p><strong>Steg 3 — Masugn.</strong> Järnmalmen smälts tillsammans med kol (koks) och kalksten i en stor ugn. Den kemiska reaktionen är: <strong>järnoxid + kol → järn + koldioxid</strong>. Kolet \"stjäl\" syret från järnet, som då rinner ut flytande som <strong>tackjärn</strong>. Kalkstenen binder föroreningar som flyter ovanpå som <strong>slagg</strong>.</p><p><strong>Steg 4 — Färskning.</strong> Tackjärn är sprött. Genom att bränna bort kolet med syre får man <strong>stål</strong>, som är hårt och <strong>smidbart</strong> — går att forma utan att spricka. Stål är en <strong>legering</strong>, en blandning av järn och lite kol. Rostfritt stål har också krom. Brons är koppar + tenn, mässing är koppar + zink.</p><div class='self-explain-prompt'>Varför är just kol det ämne som används i masugnen — vad gör det där?</div>"},
            {"heading": "Metaller i vardagen — egenskaper, rost och återvinning", "html": "<p><strong>Ädelmetaller</strong> som guld, silver och platina reagerar knappt med andra ämnen. Därför håller guldsmycken sin glans i generationer. Silver är nästan lika pålitligt men reagerar långsamt med svavel — därför svartnar silverbestick och behöver putsas.</p><p><strong>Koppar</strong> leder elektricitet bra och rostar inte i vatten eller luft. Det används i elkablar och vattenledningar. När koppar ligger ute länge bildas dock ett grönt skikt: <strong>ärg</strong>, en kemisk förening av koppar och syre. Frihetsgudinnan var ursprungligen kopparfärgad och är nu grön av samma anledning. <strong>Aluminium</strong> utvinns ur mineralet bauxit och är så lätt att det dominerar i läskburkar och flygplan. <strong>Titan</strong> stöts inte bort av kroppen och används därför i höftleder och benbrottsskruvar.</p><p>Järn som utsätts för luft och vatten <strong>rostar</strong> — det bildas järnoxid. För att skydda järn kan man <strong>galvanisera</strong> det med ett lager zink, måla det, eller välja rostfritt stål som har krom i sig.</p><p>Vissa metaller är giftiga. <strong>Bly</strong> användes i färg, ammunition och bilbatterier, men minskas idag eftersom det skadar människan. <strong>Kvicksilver</strong> fanns förr i termometrar och tandfyllningar (amalgam) — också giftigt. <strong>Malmer är ändliga</strong>: för varje ton metall som bryts blir det som är kvar svårare att nå. Att återvinna aluminium kräver bara cirka 5 % av energin som krävs för nytt — så återvinning är både miljöargument och ren ekonomi.</p><div class='self-explain-prompt'>Välj en metall och förklara varför just dess egenskaper gör den svår att ersätta i sitt viktigaste användningsområde.</div>"},
            {"heading": "Växthuseffekten — nödvändig men farlig om den ökar", "html": "<p>Runt jorden finns en <strong>atmosfär</strong> av gaser — bland annat syre, kväve och koldioxid. Atmosfären fungerar som ett växthus: solens strålar passerar in och värmer jordens yta. En del av värmen strålar ut i rymden igen, men en del stannar kvar eftersom gaser som <strong>koldioxid och vattenånga</strong> absorberar värmestrålningen och skickar tillbaka den mot jorden.</p><p>Det här är <strong>växthuseffekten</strong> — och vi behöver den. Utan atmosfär och växthuseffekt hade jorden varit alldeles för kall för att leva på. Jämför med ett riktigt växthus: solens strålar kommer in genom glaset, värmen stannar kvar, och det blir varmare inuti än utanför.</p><p>Problemet uppstår när halten växthusgaser i atmosfären <strong>ökar</strong>. Mer värme fångas in, mindre sipprar ut, och jordens medeltemperatur stiger. Det kallas en <strong>ökad växthuseffekt</strong>. Det räcker med några graders höjning av medeltemperaturen för att konsekvenserna ska bli allvarliga: extrema väder, smältande polarisar, översvämningar och torka på andra håll.</p><div class='self-explain-prompt'>Förklara varför växthuseffekten i sig inte är \"dålig\", men att en ökning av den är problematisk. Vad är det vi egentligen oroar oss för?</div>"},
            {"heading": "Fossila bränslen, energi och hållbar utveckling", "html": "<p><strong>Energiprincipen</strong> säger att energi aldrig kan förstöras eller skapas på nytt — den kan bara omvandlas från en form till en annan. Energi finns i många former: rörelseenergi, värmeenergi, strålningsenergi, kemisk energi, lägesenergi, elektrisk energi och kärnenergi.</p><p><strong>Fossila bränslen</strong> — kol, olja och naturgas — är <strong>icke förnybara</strong> eftersom de tar miljontals år att bildas. När vi kör bil eller värmer hus med fossila bränslen frigörs kol som legat bundet i marken i hundratals miljoner år, på bara några hundra år. Det är den hastigheten som rubbar kolets kretslopp och förstärker växthuseffekten. <strong>Förnybara energikällor</strong> — sol, vind, vatten — tar inte slut och orsakar inga nettoutsläpp av koldioxid.</p><p>För att få en <strong>hållbar utveckling</strong> — så vi kan leva bra idag utan att förstöra för framtiden — måste världen samarbeta. <strong>Parisavtalet</strong> slår fast att den globala temperaturökningen ska hållas under 2 grader, helst under 1,5. FN:s <strong>Globala mål</strong> nr 13 handlar om klimatet, nr 7 om hållbar energi, nr 12 om hållbar konsumtion. Själva kan vi släcka lampor, stänga av skärmar, åka mindre fossilt och återvinna. <strong>Earth Hour</strong> är en kampanj där vi släcker allt i en timme om året för att visa politikerna att frågan är viktig.</p><div class='self-explain-prompt'>Förklara varför ved räknas som förnybart men kol, olja och gas inte gör det — trots att allt fyra brinner och bildar koldioxid.</div>"}

            {"typ": "fritext", "q": "Varför behöver vi den naturliga växthuseffekten?", "accepted": ["annars skulle det vara för kallt", "för kallt", "kallt", "kyla", "frysa", "för att kunna leva", "för kall för liv", "utan den hade det varit för kallt", "det hade varit alldeles för kallt", "ingen kunde leva", "inte kunna leva"], "answered": false, "userAnswer": "", "correct_answer": false},

            {"typ": "flerval", "q": "Vad händer när halten växthusgaser i atmosfären ökar?", "options": ["Ingenting — balansen är självreglerande", "Temperaturen på jorden sjunker", "Mer värme stannar kvar vid jorden och medeltemperaturen stiger, klimatet förändras", "Polarisarna växer till sig"], "correct": 2, "answered": false, "selected": null},
            {"typ": "fritext", "q": "Vad säger energiprincipen?", "accepted": ["kan aldrig förstöras eller skapas", "kan bara omvandlas", "energi kan bara omvandlas", "energi kan varken skapas eller förstöras"], "answered": false, "userAnswer": "", "correct_answer": false},
            {"typ": "fritext", "q": "Nämn två förnybara energikällor.", "accepted": ["sol och vind", "sol, vind", "vind och vatten", "sol och vatten", "sol vind vatten", "vattenkraft", "solenergi", "vindkraft"], "answered": false, "userAnswer": "", "correct_answer": false},
            {"typ": "flerval", "q": "Vad är Parisavtalets mål för den globala temperaturökningen?", "options": ["Under 5 grader", "Under 2 grader, helst under 1,5 grader", "Under 10 grader", "Det finns inget mål"], "correct": 1, "answered": false, "selected": null},
            {"typ": "fritext", "q": "Varför är återvinning av metaller viktigt för hållbar utveckling?", "accepted": ["sparar energi", "malm tar slut", "malm är ändlig", "malm är icke förnybar", "spara energi", "mindre gruvdrift"], "answered": false, "userAnswer": "", "correct_answer": false}

        // ============================================================
        // Intro per barn — förklarar hur provet är designat + vikten av
        // att öva själv först (Foundation before leverage + Dunlosky).
        // Hårdkodad här, samma för alla prov per barn.
        // ============================================================

        const INTROS = {
            astrid: {
                title: "Så här övar du bäst",
                html: `
                    <p class="mb-3">Det här provet är gjort så att hjärnan lär sig på riktigt — inte bara låtsas.</p>
                    <ul class="list-disc pl-5 space-y-2 mb-4">
                        <li>Börja med att läsa faktan. Tryck på <strong>🔊 Läs upp</strong> om du vill lyssna.</li>
                        <li>Öva flashcards. Försök <strong>gissa först</strong> i huvudet innan du vänder på kortet!</li>
                        <li>Ta quizet. Det är okej att gissa fel — hjärnan lär sig av det.</li>
                    </ul>
                    <p class="mb-2"><strong>Viktigast:</strong> öva själv först. Fråga inte AI och inte syskonen om svaren.</p>
                    <p>Det är när du <em>kämpar lite</em> som hjärnan blir starkare — precis som när du tränar.</p>
                `
            },
            alfred: {
                title: "Så här är provet gjort",
                html: `
                    <p class="mb-3">Forskare har testat vilka studiemetoder som faktiskt funkar. Det här provet är byggt på de tre som vinner:</p>
                    <ul class="list-disc pl-5 space-y-2 mb-4">
                        <li><strong>Hämta fram fakta ur huvudet</strong> — inte bara läsa om. Det är därför vi har flashcards och quiz, inte bara text.</li>
                        <li><strong>Gissa innan du ser svaret</strong> — även om du gissar fel hjälper det hjärnan att minnas när du sen ser rätt svar.</li>
                        <li><strong>Öva lite åt gången i flera dagar</strong> — slår en lång plugg-kväll före provet. Även 10 minuter räknas.</li>
                    </ul>
                    <p class="mb-2"><strong>En regel som betyder mest:</strong> försök själv först. Fråga inte ChatGPT eller syskonen om svaren innan du har tänkt.</p>
                    <p>Det är själva <em>kämpandet</em> som gör att hjärnan faktiskt lär sig. Om du får svaret direkt missar du träningen — ungefär som om någon lyfte vikterna åt dig på gymmet.</p>
                `
            },
            alice: {
                title: "Om det här provet — hur det är designat",
                html: `
                    <p class="mb-3">Provet är byggt på kognitionsvetenskapens konsensus om vad som faktiskt fungerar när man vill lära sig något på djupet (Dunlosky et al. 2013; Roediger &amp; Karpicke; Bjork). Tre principer styr formatet:</p>
                    <ul class="list-disc pl-5 space-y-2 mb-4">
                        <li><strong>Retrieval practice (testing-effekten):</strong> att hämta fram kunskap ur huvudet — via flashcards och quiz — stärker inlärningen <em>mycket</em> mer än att läsa om samma text flera gånger. Det känns inte så, men forskningen är tydlig.</li>

                    </ul>

                    <p>Att fråga AI direkt är som att be någon lyfta vikterna åt dig. Hjärnan behöver motstånd för att utvecklas. Verktyget här är designat att ge dig motståndet — ta vara på det.</p>
                `

        // ============================================================
        // Applogik
        // ============================================================

        function studyApp() {
            return {
                config: PROV_CONFIG,
                faktatext: FAKTATEXT,
                flashcards: FLASHCARDS,
                quiz: QUIZ,
                intro: INTROS[PROV_CONFIG.barn] || INTROS.alfred,
                showIntro: true,
                mode: 'text',
                cardIndex: 0,
                flipped: false,
                score: 0,
                tts: { speaking: false, utterance: null },

                init() {
                    // Ingen speciell init-logik för tillfället
                },

                // --- Flashcards ---
                nextCard() {
                    this.flipped = false;
                    setTimeout(() => {
                        this.cardIndex = (this.cardIndex + 1) % this.flashcards.length;
                    }, 200);
                },
                prevCard() {
                    this.flipped = false;
                    setTimeout(() => {
                        this.cardIndex = this.cardIndex === 0 ? this.flashcards.length - 1 : this.cardIndex - 1;
                    }, 200);
                },
                shuffleDeck() {
                    this.flipped = false;
                    for (let i = this.flashcards.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [this.flashcards[i], this.flashcards[j]] = [this.flashcards[j], this.flashcards[i]];
                    }
                    this.cardIndex = 0;
                },

                // --- Quiz ---
                answerFlerval(qIdx, oIdx) {
                    const item = this.quiz[qIdx];
                    if (item.answered) return;
                    item.answered = true;
                    item.selected = oIdx;
                    if (oIdx === item.correct) this.score++;
                },
                answerFritext(qIdx) {
                    const item = this.quiz[qIdx];
                    if (item.answered || !item.userAnswer?.trim()) return;
                    const user = item.userAnswer.trim().toLowerCase();
                    const isCorrect = item.accepted.some(acc => {
                        const accepted = acc.toLowerCase();
                        return user === accepted || user.includes(accepted) || accepted.includes(user);
                    });
                    item.answered = true;
                    item.correct_answer = isCorrect;
                    if (isCorrect) this.score++;
                },
                resetQuiz() {
                    this.score = 0;
                    this.quiz.forEach(q => {
                        q.answered = false;
                        q.selected = null;
                        q.userAnswer = "";
                        q.correct_answer = false;
                    });
                },

                get answeredCount() {
                    return this.quiz.filter(q => q.answered).length;
                },

                metacognitiveMessage() {
                    const pct = this.score / this.quiz.length;
                    if (pct >= 0.9) return "Fantastiskt! Du har stark förståelse av materialet. Återgå bara till frågorna du fick fel på — de visar exakt vad som ska vässas.";
                    if (pct >= 0.7) return "Bra jobbat! Du har bra grund men några luckor. Gå tillbaka till flashcards och fokusera på frågorna du fick fel — det är din mest effektiva repetition nu.";
                    if (pct >= 0.5) return "Du är halvvägs. Gå igenom faktatexten igen och öva flashcards innan du tar quizet nästa gång. Korten som är svåra för dig just nu är guldet.";
                    return "Mycket kvar att öva. Börja med faktatexten och ta det lugnt. Öva flashcards i små pass — 5–10 minuter räcker — och ta quizet igen när du känner dig tryggare.";
                },

                // --- TTS (för Astrid) ---
                speakAll() {
                    if (!('speechSynthesis' in window)) {
                        alert("Din webbläsare stöder inte uppläsning.");
                        return;
                    }
                    if (this.tts.speaking) {
                        window.speechSynthesis.cancel();
                        this.tts.speaking = false;
                        return;
                    }
                    const text = this.faktatext.map(s => {
                        const tmp = document.createElement('div');
                        tmp.innerHTML = s.html;
                        return s.heading + ". " + (tmp.textContent || "");
                    }).join(" ");
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'sv-SE';
                    u.rate = 0.95;
                    u.onstart = () => this.tts.speaking = true;
                    u.onend = () => this.tts.speaking = false;
                    u.onerror = () => this.tts.speaking = false;
                    this.tts.utterance = u;
                    window.speechSynthesis.speak(u);
                }
            }
        }
    </script>
