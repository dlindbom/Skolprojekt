<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studieportalen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }

        /* Subtilt rutat papper */
        .grid-bg {
            background-image:
                linear-gradient(#e2e8f0 1px, transparent 1px),
                linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Hård skugga, inspirerad av mattesidan */
        .hard-shadow {
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,0.08);
            transition: all 0.2s ease;
        }
        .hard-shadow:hover {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,0.12);
            transform: translate(-2px, -2px);
        }
        .hard-shadow:active {
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,0.08);
            transform: translate(2px, 2px);
        }

        /* Flytande emojis */
        @keyframes drift {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.15; }
            50% { transform: translateY(-18px) rotate(8deg); opacity: 0.3; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.15; }
        }
        .floating {
            position: fixed;
            font-size: 2rem;
            animation: drift 7s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="bg-gray-50 grid-bg text-gray-900 min-h-screen relative overflow-x-hidden">

    <!-- Flytande emojis i bakgrunden -->
    <div class="floating" style="top: 12%; left: 8%; animation-delay: 0s;">&#128218;</div>
    <div class="floating" style="top: 25%; right: 10%; animation-delay: 1.5s;">&#9999;&#65039;</div>
    <div class="floating" style="bottom: 20%; left: 15%; animation-delay: 3s;">&#127891;</div>
    <div class="floating" style="bottom: 12%; right: 12%; animation-delay: 4.5s;">&#128161;</div>
    <div class="floating" style="top: 55%; left: 5%; animation-delay: 2s;">&#11088;</div>

    <div class="relative z-10">
        <!-- Header -->
        <header class="pt-12 pb-6 text-center px-6">
            <div class="inline-flex items-center gap-2 bg-white border-2 border-gray-200 rounded-full px-4 py-1.5 text-xs font-bold text-gray-400 uppercase tracking-widest mb-6 hard-shadow" style="box-shadow: 3px 3px 0px 0px rgba(0,0,0,0.06);">
                <span>&#128640;</span> Plugga smart
            </div>
            <h1 class="text-4xl sm:text-5xl font-black tracking-tight text-gray-900">Studieportalen</h1>
            <p class="mt-3 text-gray-400 font-medium">Vem ska plugga idag?</p>
        </header>

        <!-- Barnkort -->
        <main class="max-w-5xl mx-auto px-6 py-8 pb-16">
            <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-6">

                <!-- Alice -->
                <a href="alice/index.html" class="group block bg-white rounded-2xl border-2 border-gray-200 hard-shadow overflow-hidden">
                    <div class="h-2 bg-gradient-to-r from-blue-400 to-blue-600"></div>
                    <div class="p-7">
                        <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-2xl font-black mb-4 border-2 border-blue-200 group-hover:scale-110 group-hover:rotate-3 transition-all duration-200">A</div>
                        <h2 class="text-xl font-extrabold tracking-tight">Alice</h2>
                        <p class="text-sm text-gray-400 font-medium mt-0.5">Årskurs 6</p>
                        <div class="mt-5 inline-flex items-center text-sm text-blue-600 font-bold bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100 group-hover:bg-blue-100 transition">
                            Visa prov
                            <svg class="w-4 h-4 ml-1.5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                        </div>
                    </div>
                </a>

                <!-- Alfred -->
                <a href="alfred/index.html" class="group block bg-white rounded-2xl border-2 border-gray-200 hard-shadow overflow-hidden">
                    <div class="h-2 bg-gradient-to-r from-emerald-400 to-emerald-600"></div>
                    <div class="p-7">
                        <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center text-2xl font-black mb-4 border-2 border-emerald-200 group-hover:scale-110 group-hover:rotate-3 transition-all duration-200">A</div>
                        <h2 class="text-xl font-extrabold tracking-tight">Alfred</h2>
                        <p class="text-sm text-gray-400 font-medium mt-0.5">Årskurs 4</p>
                        <div class="mt-5 inline-flex items-center text-sm text-emerald-600 font-bold bg-emerald-50 px-3 py-1.5 rounded-lg border border-emerald-100 group-hover:bg-emerald-100 transition">
                            Visa prov
                            <svg class="w-4 h-4 ml-1.5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                        </div>
                    </div>
                </a>

                <!-- Astrid -->
                <a href="astrid/index.html" class="group block bg-white rounded-2xl border-2 border-gray-200 hard-shadow overflow-hidden">
                    <div class="h-2 bg-gradient-to-r from-violet-400 to-violet-600"></div>
                    <div class="p-7">
                        <div class="w-14 h-14 bg-violet-100 text-violet-600 rounded-xl flex items-center justify-center text-2xl font-black mb-4 border-2 border-violet-200 group-hover:scale-110 group-hover:rotate-3 transition-all duration-200">A</div>
                        <h2 class="text-xl font-extrabold tracking-tight">Astrid</h2>
                        <p class="text-sm text-gray-400 font-medium mt-0.5">Årskurs 2</p>
                        <div class="mt-5 inline-flex items-center text-sm text-violet-600 font-bold bg-violet-50 px-3 py-1.5 rounded-lg border border-violet-100 group-hover:bg-violet-100 transition">
                            Visa prov
                            <svg class="w-4 h-4 ml-1.5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                        </div>
                    </div>
                </a>

            </div>
        </main>

        <footer class="text-center pb-8">
            <p class="text-xs text-gray-300 font-medium">Studieportalen &mdash; plugga smart inför proven</p>
        </footer>
    </div>

</body>
</html>
