<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrid — Årskurs 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .grid-bg {
            background-image:
                linear-gradient(#e2e8f0 1px, transparent 1px),
                linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }
        @keyframes drift {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.12; }
            50% { transform: translateY(-14px) rotate(6deg); opacity: 0.25; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.12; }
        }
        .floating {
            position: fixed;
            font-size: 1.8rem;
            animation: drift 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="bg-gray-50 grid-bg text-gray-900 min-h-screen relative overflow-x-hidden">

    <div class="floating" style="top: 15%; right: 10%; animation-delay: 0s;">&#127800;</div>
    <div class="floating" style="bottom: 25%; left: 8%; animation-delay: 2s;">&#129412;</div>
    <div class="floating" style="top: 50%; left: 6%; animation-delay: 4s;">&#127752;</div>

    <div class="relative z-10">
        <header class="pt-8 pb-6 px-6">
            <div class="max-w-3xl mx-auto">
                <a href="../index.html" class="inline-flex items-center text-sm text-gray-400 hover:text-gray-900 font-semibold transition mb-6 group">
                    <svg class="w-4 h-4 mr-1.5 group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                    Tillbaka
                </a>
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-violet-100 text-violet-600 rounded-xl flex items-center justify-center text-2xl font-black border-2 border-violet-200">A</div>
                    <div>
                        <h1 class="text-3xl font-black tracking-tight">Astrid</h1>
                        <p class="text-sm text-gray-400 font-semibold">Årskurs 2</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-3xl mx-auto px-6 py-8">
            <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Prov & uppgifter</h2>

            <div class="text-center py-16">
                <div class="w-16 h-16 bg-violet-50 text-violet-400 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 border-2 border-violet-100">&#128218;</div>
                <p class="text-gray-500 font-semibold">Inga prov just nu</p>
                <p class="text-sm text-gray-300 mt-1">Nya prov dyker upp här när de läggs till</p>
            </div>
        </main>

        <footer class="text-center pb-8">
            <p class="text-xs text-gray-300 font-medium">Studieportalen &mdash; plugga smart inför proven</p>
        </footer>
    </div>

</body>
</html>
